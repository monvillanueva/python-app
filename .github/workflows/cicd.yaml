name: cicd

on:
  push:
    paths:
      - src/**
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT  
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: monvillanueva/python-app:${{ steps.vars.outputs.sha_short }}
  cd:
    needs: ci
    runs-on: self-hosted
    steps:

      - name: Install Argocd
        shell: bash
        run:
          curl -ksSL -o argocd-linux-amd64 https://argocd-server.argocd/downloads/argocd-linux-amd64
          chmod +x argocd
          sudo mv ./argocd /usr/local/bin/argocd
      - name: Argocd app sync
        shell: bash
        run:
          # the login url is a hack to allow our runner access to the argo server 
          # since argocd.test.com not accessible because it is a hack for a fake DNS on my system
          argocd login argocd-server.argocd \
            --insecure \
            --grpc-web \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD }}
          argocd app sync python-app
