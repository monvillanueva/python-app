name: cicd

on:
  push:
    paths:
      - src/**
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      commit_id: ${{ steps.vars.outputs.sha_short }}
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT  
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: monvillanueva/python-app:${{ steps.vars.outputs.sha_short }}
  cd:
    needs: ci
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Modify values file
        shell: bash
        run: |
          echo ${{ needs.ci.outputs.commit_id }}
          sudo apt update
          sudo apt install yq -y
          sudo yq -yi '.image.tag = "${{needs.ci.outputs.commit_id}}"' charts/python-app/values.yaml
      - name: Commit changes
        uses: EndBug/add-and-commit@v10
        with:
          message: 'Auto-update values.yaml with commit ${{needs.ci.outputs.commit_id}}'
      - name: Install Argocd
        shell: bash
        run: |
          sudo curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo chmod +x /usr/local/bin/argocd
      - name: Argocd app sync
        shell: bash
        run: |
          # the login url is a hack to allow our runner access to the argo server
          # since argocd.test.com not accessible because it is a hack for a fake DNS on my system
          argocd login argocd-server.argocd \
            --insecure \
            --grpc-web \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD }}
          argocd app sync python-app
